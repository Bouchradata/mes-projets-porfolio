<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio Bouchra - Data Analyst</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background-color: #f5f1ea;
}

header {
    background-color: #1e3a8a;
    color: white;
    padding: 30px;
    text-align: center;
}

section {
    padding: 30px;
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px 0;
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

.step {
    cursor: pointer;
    padding: 10px;
    border-radius: 8px;
    margin: 5px 0;
    background: #e5e7eb;
}

.step.done {
    background: #1e3a8a;
    color: white;
}

a {
    color: #1e3a8a;
    text-decoration: none;
    font-weight: bold;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #1e3a8a;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<header>
    <h1>Bouchra - Data Analyst</h1>
    <p>Portfolio interactif | Suivi de progression</p>
</header>

<section>

    <h2>📊 Mes projets</h2>

    <div class="card">
        <h3>🏠 Analyse Airbnb</h3>
        <p>Objectif : identifier les zones rentables</p>

        <div class="step" onclick="toggleStep(this)">Collecte des données</div>
        <div class="step" onclick="toggleStep(this)">Nettoyage des données</div>
        <div class="step" onclick="toggleStep(this)">Analyse exploratoire</div>
        <div class="step" onclick="toggleStep(this)">Visualisation</div>

        <br>
        <a href="https://github.com/Bouchradata/projet-airbnb" target="_blank">
            🔗 Voir sur GitHub
        </a>
    </div>

</section>

<section>
    <h2>➕ Ajouter un projet</h2>

    <input type="text" id="projectName" placeholder="Nom du projet">
    <button onclick="addProject()">Ajouter</button>

    <div id="projects"></div>
</section>

<script>
function toggleStep(element) {
    element.classList.toggle("done");
}

function addProject() {
    let name = document.getElementById("projectName").value;

    if(name === "") return;

    let container = document.getElementById("projects");

    let newProject = document.createElement("div");
    newProject.className = "card";
    newProject.innerHTML = `
        <h3>${name}</h3>
        <div class="step" onclick="toggleStep(this)">Étape 1</div>
        <div class="step" onclick="toggleStep(this)">Étape 2</div>
        <div class="step" onclick="toggleStep(this)">Étape 3</div>
    `;

    container.appendChild(newProject);
}
</script>

</body>
</html>
